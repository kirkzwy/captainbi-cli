name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
      - run: go vet ./...
      - run: go test ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - run: go run ./tools/gen-registry
      - run: git diff --exit-code
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm pack --ignore-scripts
      - run: tar -tzf captainbi-cli-*.tgz | grep -q 'package/skills/captainbi-shared/SKILL.md'
      - run: gh release upload "${GITHUB_REF_NAME}" captainbi-cli-*.tgz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install --prefix /tmp/cbi-npm-smoke -g ./captainbi-cli-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: /tmp/cbi-npm-smoke/bin/cbi --version
      - run: /tmp/cbi-npm-smoke/bin/cbi doctor local --machine
      - run: |
          version="${GITHUB_REF_NAME#v}"
          npm install --foreground-scripts --prefix /tmp/cbi-gh-smoke -g "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/captainbi-cli-${version}.tgz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: /tmp/cbi-gh-smoke/bin/cbi --version
      - run: /tmp/cbi-gh-smoke/bin/cbi doctor local --machine --format json
