name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - run: go test ./...
      - run: go run ./tools/gen-registry
      - run: git diff --exit-code
      - run: go build -buildvcs=false -o npm/bin/cbi .
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm pack --ignore-scripts
      - run: node npm/run.js --version
      - run: node npm/run.js doctor local --machine
